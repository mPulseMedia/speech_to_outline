<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700">
  <defs>
    <style>
      .bg { fill: #0b0f14; }
      .box { fill: #121a24; stroke: #3a4a5e; stroke-width: 2; }
      .title { fill: #e6edf3; font: 700 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto; }
      .text { fill: #cbd5e1; font: 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto; }
      .muted { fill: #94a3b8; font: 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto; }
      .edge { stroke: #6b86a5; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .edge2 { stroke: #4b647f; stroke-width: 2; fill: none; marker-end: url(#arrow); stroke-dasharray: 6 6; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#6b86a5" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1100" height="700"/>

  <!-- Boxes -->
  <rect class="box" x="50" y="40" width="330" height="220" rx="14"/>
  <text class="title" x="70" y="75">DEFAULT_CONFIG</text>
  <text class="text" x="70" y="105">pauseBoundaryMs</text>
  <text class="text" x="70" y="130">labelDelayMs, speedMs</text>
  <text class="text" x="70" y="155">liveWindowMs</text>
  <text class="text" x="70" y="180">autoCollapseAfterSteps</text>
  <text class="text" x="70" y="205">boundaryStarters</text>
  <text class="muted" x="70" y="235">+ caps + thresholds</text>

  <rect class="box" x="430" y="40" width="620" height="220" rx="14"/>
  <text class="title" x="450" y="75">engine</text>
  <text class="text" x="450" y="105">engine.thoughts : Thought[]</text>
  <text class="muted" x="450" y="130">ordered, append-only during stream</text>

  <rect class="box" x="430" y="290" width="360" height="320" rx="14"/>
  <text class="title" x="450" y="325">Thought</text>
  <text class="text" x="450" y="355">id, createdAtMs</text>
  <text class="text" x="450" y="380">utterances : Utterance[]</text>
  <text class="text" x="450" y="405">labelStatus, label, plannedTitle</text>
  <text class="text" x="450" y="430">superTitle, sectionTitle</text>
  <text class="text" x="450" y="455">boundaryAfterUtteranceId</text>
  <text class="text" x="450" y="480">boundaryRecognizedAtUtteranceId</text>
  <text class="text" x="450" y="505">boundaryRecognizedForUtteranceId</text>
  <text class="muted" x="450" y="535">+ ui flags + effective boundary fields</text>

  <rect class="box" x="840" y="290" width="210" height="180" rx="14"/>
  <text class="title" x="860" y="325">Utterance</text>
  <text class="text" x="860" y="355">id</text>
  <text class="text" x="860" y="380">tMs</text>
  <text class="text" x="860" y="405">text</text>

  <rect class="box" x="50" y="290" width="330" height="200" rx="14"/>
  <text class="title" x="70" y="325">Streaming</text>
  <text class="text" x="70" y="355">fullQueue</text>
  <text class="text" x="70" y="380">queueIndex</text>
  <text class="text" x="70" y="405">streamStep, paused</text>
  <text class="text" x="70" y="430">pushStreamHistorySnapshot()</text>
  <text class="text" x="70" y="455">restoreStreamHistorySnapshot()</text>

  <rect class="box" x="50" y="520" width="330" height="140" rx="14"/>
  <text class="title" x="70" y="555">streamHistory (snapshots)</text>
  <text class="text" x="70" y="585">timeMs, queueIndex, paused</text>
  <text class="text" x="70" y="610">engine + transcript + UI maps/sets</text>

  <!-- Edges -->
  <path class="edge" d="M215 260 C215 285, 215 285, 215 290"/>
  <text class="muted" x="92" y="280">config influences</text>

  <path class="edge" d="M380 150 C410 150, 410 150, 430 150"/>
  <text class="muted" x="300" y="140">used by</text>

  <path class="edge" d="M610 260 C610 275, 610 275, 610 290"/>
  <text class="muted" x="540" y="285">contains</text>

  <path class="edge" d="M790 380 C815 380, 815 380, 840 380"/>
  <text class="muted" x="795" y="365">utterances[]</text>

  <path class="edge2" d="M215 490 C215 505, 215 505, 215 520"/>
  <text class="muted" x="70" y="510">snapshot / rewind</text>

  <path class="edge2" d="M380 590 C410 590, 410 450, 430 450"/>
  <text class="muted" x="305" y="575">restores</text>
</svg>

